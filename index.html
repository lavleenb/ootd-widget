<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>outfit-of-the-day widget</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overall-wrapper">
        <aside class="title-aside">
            <h1>leia's</h1>
            <h1>outfit</h1>
            <h1>of the day.</h1>
        </aside>
        <div class="main-wrapper">
            <div class="container" id="doll">
                <!-- base-layer doll 
                    clothes on top just like autumn wardrobes 
                -->
                <div class="parent">
                    <img class="base-layer" src="images/base-layer.png">
                    <img class="outfit" src="images/outfit.png">
                </div>
            </div>

            <div class="container" id="clothing-grid">
                <!-- cute aesthetic grid of the clothes-->
                <div class="grid-container">
                    <button class="clothing-btn" id="shoes-btn" modal-id="shoes-modal"><img class="clothing" src="images/shoes.png"></button>
                    <button class="clothing-btn" id="bottoms-btn" modal-id="bottoms-modal"><img class="clothing" src="images/bottoms copy.png"></button>
                    <button class="clothing-btn" id="sweater-btn" modal-id="sweater-modal"><img class="clothing" src="images/sweater.png"></button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal" id="sweater-modal">
        <button class="modal-close-btn">X</button>
        <div class="modal-content">
            <div class="modal-left-box">
                <img class="modal-image" id="modal-sweater-img" src="images/sweater.png">
            </div>
            <div class="modal-right-box">
                <h3>green ribbed sweater</h3>
                <p>brand: scotch & soda</p>
            </div>
        </div>
    </div>
    <div class="modal" id="bottoms-modal">
        <button class="modal-close-btn">X</button>
        <div class="modal-content">
            <div class="modal-left-box">
                <img class="modal-image" id="modal-jeans-img" src="images/bottoms.png">
            </div>
            <div class="modal-right-box">
                <h3>mid-rise wide-leg jeans</h3>
                <p>brand: H&M</p>
            </div>
        </div>
    </div>
    <div class="modal" id="shoes-modal">
        <button class="modal-close-btn">X</button>
        <div class="modal-content">
            <div class="modal-left-box">
                <img class="modal-image" id="modal-shoes-img" src="images/shoes.png">
            </div>
            <div class="modal-right-box">
                <h3>custom brown hi-top sneakers</h3>
                <p>brand: converse</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
